# chill-out cooldown configuration for the npm example project.
#
# Windows are deliberately generous so the demo surfaces violations no
# matter when you run it. Chill-out also accepts a `chill-out` block in
# package.json or a matching dependabot.yml entry; pick exactly one
# source per project (chill-out treats two as a configuration error).
cooldown:
  default: 7
  major: 30
  minor: 14
  patch: 7
