# Configuration for chill-out documentation (rendered with zensical)
#
# Zensical reads mkdocs-style configuration; the build is driven by:
#
#     uv run --project docs zensical build --config-file=docs/mkdocs.yaml
#
# See ./pyproject.toml for the docs-only dependency set.

site_name: chill-out documentation
site_url: https://dusktreader.github.io/chill-out
repo_url: https://github.com/dusktreader/chill-out
docs_dir: source
theme:
  name: material
  features:
    - navigation.expand
    - navigation.footer
    - navigation.tracking
    - content.code.copy
  font:
    code: Fira Code
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
extra_css:
  - stylesheets/extra.css
nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Configuration: configuration.md
  - Ecosystems: ecosystems.md
  - Comparison: comparison.md
  - CLI: cli.md
  - Programmatic API: api.md
  - Examples: examples.md
  - Reference: reference.md
watch:
  - source/
  - ../src/chill_out
  - ../examples
plugins:
  search:
    lang: en
  mkdocstrings:
    default_handler: python
    handlers:
      python:
        paths: [..]
        options:
          heading_level: 3
          show_root_heading: true
          separate_signature: true
          show_signature_annotations: true
          show_source: false
          docstring_style: google
markdown_extensions:
  - admonition:
  - attr_list:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite:
  - pymdownx.snippets:
  - pymdownx.superfences:
  - pymdownx.details:
